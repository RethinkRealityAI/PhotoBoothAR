<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#05060B" />
    <meta name="description" content="Beamwall — give every guest an AR photo booth in their pocket and beam their photos onto a cinematic live wall. Design frames, effects and greeting cards in minutes. No app to download." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Beamwall" />

    <link rel="canonical" href="https://beamwall.netlify.app/" />

    <!-- Fonts: preconnect + async-friendly stylesheet links replace the old
         render-blocking @import chain in src/index.css. Families/weights are
         the ones the platform theme actually uses (Cormorant = --font-serif,
         Inter = --font-sans, Jost = --font-label). Pinyon Script is NOT
         loaded here: only the legacy gala events use it, and their configs
         inject their own fontHref (which includes it) at runtime. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Jost:wght@300;400;500;600&display=swap"
    />

    <!-- Open Graph / share preview -->
    <meta property="og:title" content="Beamwall · AR photo booth & live wall for events" />
    <meta property="og:description" content="Your event, in augmented reality. A magical AR booth for every guest and a live wall the whole room watches." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beamwall.netlify.app/" />
    <meta property="og:image" content="https://beamwall.netlify.app/og.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://beamwall.netlify.app/og.jpg" />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235B8CFF'/%3E%3Cstop offset='1' stop-color='%237C6CF7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='%2305060B' stroke='url(%23g)' stroke-width='1.5'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='18' font-style='italic' text-anchor='middle' fill='url(%23g)'%3EB%3C/text%3E%3C/svg%3E" />

    <title>Beamwall · AR photo booth & live wall for events</title>

    <!-- Structured data: Organization + product (real tiers, no fabricated
         ratings) + the landing page's actual FAQ content. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://beamwall.netlify.app/#org",
          "name": "Beamwall",
          "url": "https://beamwall.netlify.app/",
          "email": "dapo@rethinkreality.ai"
        },
        {
          "@type": "SoftwareApplication",
          "name": "Beamwall",
          "url": "https://beamwall.netlify.app/",
          "applicationCategory": "MultimediaApplication",
          "operatingSystem": "Web browser (iOS Safari, Android Chrome, desktop)",
          "description": "Self-serve AR photo booth, live photo wall, photo challenges and keepsake cards for events. Guests scan a QR code and capture face-tracked AR photos in their browser — no app to download — while every shot beams onto a cinematic live wall.",
          "image": "https://beamwall.netlify.app/og.jpg",
          "publisher": { "@id": "https://beamwall.netlify.app/#org" },
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD", "description": "1 live event, up to 25 photos, photo booth + live wall, a subtle Beamwall credit." },
            { "@type": "Offer", "name": "Essentials", "price": "49", "priceCurrency": "USD", "description": "Per event. Up to 500 photos, video guestbook, no watermark, every frame & effect." },
            { "@type": "Offer", "name": "Premium", "price": "99", "priceCurrency": "USD", "description": "Per event. Unlimited photos & video, AI event studio, greeting cards, priority support." },
            { "@type": "Offer", "name": "Deluxe", "price": "169", "priceCurrency": "USD", "description": "Per event. Everything in Premium plus a keepsake highlight film, premium card renders and white-glove setup." },
            { "@type": "Offer", "name": "Beamwall Pro", "price": "79", "priceCurrency": "USD", "description": "Per month. Premium features across every event for frequent hosts." }
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            { "@type": "Question", "name": "Do my guests need to download an app?", "acceptedAnswer": { "@type": "Answer", "text": "No. The booth runs right in the phone browser — guests scan your QR code and they're in. Nothing to install." } },
            { "@type": "Question", "name": "Will it work on my guests' phones?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — it runs in modern mobile browsers (iOS Safari, Android Chrome). The camera stays on their device; nothing leaves it until they choose to share a photo." } },
            { "@type": "Question", "name": "How long does it take to set up?", "acceptedAnswer": { "@type": "Answer", "text": "Minutes. Pick a style, tweak your frames and effects in the studio, and share the QR — you can have a booth live well before your event." } },
            { "@type": "Question", "name": "What if the venue wifi is patchy?", "acceptedAnswer": { "@type": "Answer", "text": "The magic runs on each guest's device, so only the finished photo needs to upload — it works on cellular data, and you moderate what hits the wall from your phone." } },
            { "@type": "Question", "name": "What does it cost?", "acceptedAnswer": { "@type": "Answer", "text": "Start free — one event, up to 25 photos. Paid event packages start at $49, and Beamwall Pro is $79/month for frequent hosts. You only pay for events you run." } },
            { "@type": "Question", "name": "Is our event private?", "acceptedAnswer": { "@type": "Answer", "text": "You control it. Guests' captures appear on your wall by design and you can moderate or remove any of them at any time; see our Privacy Policy for the full details." } }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p>
        Beamwall gives every event an AR photo booth in each guest&rsquo;s pocket and a cinematic
        live photo wall the whole room watches. Guests scan one QR code and capture face-tracked
        photos and videos right in their browser — no app to download — while hosts design frames,
        effects, photo challenges and keepsake greeting cards in a self-serve studio in minutes.
        Beamwall needs JavaScript to run. <a href="/signup">Create your event</a>,
        <a href="/login">sign in</a>, or read our <a href="/privacy">Privacy Policy</a> and
        <a href="/terms">Terms of Service</a>.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
