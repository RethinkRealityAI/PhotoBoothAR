name: CI

on:
  push:
    branches: ['claude/**', 'main']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts: onnxruntime-node's postinstall fetches a native
        # binary from an external CDN that intermittently times out (ETIMEDOUT/
        # ENETUNREACH) on hosted runners — the same failure documented against
        # this repo's own sandbox. That binary is unused by typecheck/test/build
        # (browser-side face tracking runs MediaPipe's WASM build, not this Node
        # native addon), so skipping install-time scripts removes the flaky
        # network dependency without affecting any step below.
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
