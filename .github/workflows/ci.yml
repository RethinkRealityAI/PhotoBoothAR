name: CI

on:
  push:
    branches: ['claude/**', 'main']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ — native WebSocket (required by @supabase/realtime-js, which
          # is constructed at import time by any test that touches the client).
          # Node 20 is deprecated on runners and lacks native WebSocket.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      # The legacy single-event build must never regress (see CLAUDE.md).
      - name: Build (legacy single-event)
        run: VITE_EVENT=hope-gala npm run build
